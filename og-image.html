<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0E0E0E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: #1E5EF3;
      opacity: 0.06;
    }
    .c1 { width: 500px; height: 500px; top: -180px; right: -120px; }
    .c2 { width: 360px; height: 360px; bottom: -140px; left: -100px; }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-row img {
      height: 160px;
      width: auto;
    }

    .flags {
      font-size: 36px;
      letter-spacing: 10px;
      margin-bottom: 36px;
    }

    h1 {
      font-size: 72px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
  </style>
</head>
<body>
  <div class="circle c1"></div>
  <div class="circle c2"></div>

  <div class="content">
    <div class="logo-row">
      <img src="infox-logo.png" alt="Student InfoX Hub" />
    </div>
    <div class="flags">🇳🇬 🇬🇭 🇰🇪 🇿🇦 🇺🇬 🇹🇿 🇪🇹 🇷🇼 🇨🇲 🇸🇳</div>
    <h1>The UK move, done right.</h1>
  </div>
</body>
</html>

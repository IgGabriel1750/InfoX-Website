<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0E0E0E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Decorative circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: #1E5EF3;
      opacity: 0.06;
    }
    .c1 { width: 500px; height: 500px; top: -180px; right: -120px; }
    .c2 { width: 360px; height: 360px; bottom: -140px; left: -100px; }
    .c3 { width: 200px; height: 200px; top: 60%; left: 55%; opacity: 0.04; }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 80px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 36px;
    }

    .logo-row img {
      height: 110px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    h1 {
      font-size: 64px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    p {
      font-size: 24px;
      color: #B9B9BD;
      line-height: 1.5;
      max-width: 800px;
      margin: 0 auto 32px;
    }

    .flags {
      font-size: 32px;
      letter-spacing: 8px;
      margin-bottom: 28px;
    }

    .pill {
      display: inline-block;
      background: #1E5EF3;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      letter-spacing: 0.02em;
    }

    .url {
      position: absolute;
      bottom: 28px;
      right: 40px;
      font-size: 16px;
      color: #6B6B6B;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>

  <div class="content">
    <div class="logo-row">
      <img src="infox-logo-dark.png" alt="Student InfoX Hub" />
    </div>
    <div class="flags">🇳🇬 🇬🇭 🇰🇪 🇿🇦 🇺🇬 🇹🇿 🇪🇹 🇷🇼 🇨🇲 🇸🇳</div>
    <h1>The UK move, done right.</h1>
    <p>Real support from students who've been there. Airport pickups, accommodation help, visa guidance and a free community.</p>
    <span class="pill">Join the Community</span>
  </div>

  <div class="url">studentinfox.com</div>
</body>
</html>
